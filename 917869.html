<!DOCTYPE html>｛｝
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字合成游戏</title>
    <style>
    :root {
        --bg1: #0f1021;
        --bg2: #1b1f4a;
        --bg3: #2b0f45;
        --glass: rgba(255, 255, 255, 0.1);
        --glass-stroke: rgba(255, 255, 255, 0.28);
        --text-main: #f5f7ff;
        --text-sub: #b6bee0;
        --ok: #36d1dc;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html,
    body {
        width: 100%;
        height: 100%;
    }

    body {
        font-family: "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
            radial-gradient(circle at 15% 20%, #2a1a78 0%, transparent 32%),
            radial-gradient(circle at 85% 10%, #1f5dbe 0%, transparent 30%),
            radial-gradient(circle at 50% 100%, #4f1d6f 0%, transparent 34%),
            linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 22px;
        overflow: hidden;
    }

    .game-container {
        width: min(520px, 92vw);
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02));
        border: 1px solid var(--glass-stroke);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        position: relative;
        overflow: hidden;
    }

    .game-container::before {
        content: "";
        position: absolute;
        inset: -40%;
        background: conic-gradient(from 180deg at 50% 50%, rgba(255, 255, 255, 0.15), transparent 40%, transparent);
        animation: spin 28s linear infinite;
        z-index: 0;
        opacity: 0.25;
        pointer-events: none;
    }

    .game-container > * {
        position: relative;
        z-index: 1;
    }

    h1 {
        text-align: center;
        margin-bottom: 6px;
        font-size: clamp(1.35rem, 4vw, 2rem);
        letter-spacing: 1px;
        background: linear-gradient(90deg, #f9d423, #ff4e50, #24c6dc);
        -webkit-background-clip: text;
        color: transparent;
    }

    .subtitle {
        text-align: center;
        color: var(--text-sub);
        margin-bottom: 14px;
        font-size: 12px;
    }

    .score-board {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 14px;
    }

    .score-item {
        background: var(--glass);
        border: 1px solid var(--glass-stroke);
        border-radius: 14px;
        text-align: center;
        padding: 12px 8px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .score-label {
        color: var(--text-sub);
        font-size: 12px;
    }

    .score-value {
        margin-top: 4px;
        color: var(--text-main);
        font-size: clamp(1.3rem, 3vw, 1.7rem);
        font-weight: 800;
        letter-spacing: 1px;
        text-shadow: 0 2px 10px rgba(255, 255, 255, 0.25);
    }

    .message {
        text-align: center;
        padding: 12px 14px;
        margin-bottom: 14px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
        display: none;
    }

    .message.success {
        background: rgba(54, 209, 220, 0.16);
        color: #7fffd4;
        border: 1px solid rgba(54, 209, 220, 0.45);
        display: block;
    }

    .message.info {
        background: rgba(173, 216, 255, 0.16);
        color: #a8d8ff;
        border: 1px solid rgba(168, 216, 255, 0.35);
        display: block;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 14px;
        border-radius: 16px;
        margin-bottom: 14px;
        position: relative;
        box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.08);
    }

    .cell {
        aspect-ratio: 1 / 1;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: 800;
        font-size: clamp(1.2rem, 3.5vw, 1.9rem);
        transition: transform 0.18s ease, background 0.3s ease, box-shadow 0.3s ease;
        color: #fff;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .cell[data-value="6"] { background: linear-gradient(135deg, #38bdf8, #0ea5e9); box-shadow: 0 0 12px rgba(14, 165, 233, 0.45); }
    .cell[data-value="7"] { background: linear-gradient(135deg, #4ade80, #16a34a); box-shadow: 0 0 12px rgba(22, 163, 74, 0.35); }
    .cell[data-value="8"] { background: linear-gradient(135deg, #f472b6, #db2777); box-shadow: 0 0 12px rgba(219, 39, 119, 0.35); }
    .cell[data-value="1"] { background: linear-gradient(135deg, #c084fc, #8b5cf6); box-shadow: 0 0 12px rgba(139, 92, 246, 0.45); }
    .cell[data-value="13"] { background: linear-gradient(135deg, #fb923c, #f97316); box-shadow: 0 0 12px rgba(249, 115, 22, 0.4); color: #fff; }
    .cell[data-value="78"] { background: linear-gradient(135deg, #67e8f9, #06b6d4); box-shadow: 0 0 12px rgba(6, 182, 212, 0.4); color: #0b1020; }
    .cell[data-value="91"] { background: linear-gradient(135deg, #fde047, #f59e0b); box-shadow: 0 0 12px rgba(245, 158, 11, 0.45); color: #3b2f00; }
    .cell[data-value="9"] { background: linear-gradient(135deg, #f87171, #dc2626); box-shadow: 0 0 12px rgba(220, 38, 38, 0.4); }

    .tile-pop {
        animation: tilePop .22s cubic-bezier(.2, 1.2, .3, 1);
    }

    .controls {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        max-width: 280px;
        margin: 0 auto 14px;
    }

    .btn {
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        height: 56px;
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.85), rgba(76, 91, 196, 0.85));
        color: #fff;
        font-size: 21px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.12s ease, filter 0.2s ease;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    .btn:hover {
        filter: brightness(1.08);
        transform: translateY(-1px);
    }

    .btn:active {
        transform: translateY(1px) scale(0.98);
    }

    .btn-new {
        grid-column: 1 / -1;
        height: 50px;
        background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .rules {
        margin-top: 12px;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
        color: #d6ddff;
        font-size: 12px;
        line-height: 1.7;
    }

    .rules h3 {
        color: #ffffff;
        margin-bottom: 6px;
    }

    @keyframes tilePop {
        0% { transform: scale(0.85); }
        100% { transform: scale(1); }
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
        .game-container {
            padding: 16px;
            border-radius: 18px;
        }

        .cell {
            font-size: clamp(1.05rem, 7vw, 1.45rem);
        }
    }
    </style>

</head>
<body>
    <div class="game-container">
        <h1>🎮 数字合成游戏</h1>
        
        <div class="score-board">
            <div class="score-item">
                <div class="score-label">步数</div>
                <div class="score-value" id="moves">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">最高数字</div>
                <div class="score-value" id="max-tile">0</div>
            </div>
        </div>

        <div id="message" class="message"></div>

        <div class="grid" id="grid"></div>

        <div class="controls">
            <button class="btn" onclick="move('up')">↑</button>
            <button class="btn" onclick="move('left')">←</button>
            <button class="btn" onclick="move('right')">→</button>
            <button class="btn" onclick="move('down')">↓</button>
            <button class="btn btn-new" onclick="newGame()">新游戏</button>
        </div>

        <div class="rules">
            <h3>📜 游戏规则</h3>
            <p><strong>生成:</strong> 随机生成 6, 7, 8</p>
            <p><strong>竖向合成:</strong> 6→7=13, 7→6=1, 8→7=1, 13↔78=91, 91↔1=9</p>
            <p><strong>横向合成:</strong> 7→8=78, 13↔78=91, 6→9=69, 91↔1=9</p>
            <p><strong>消失:</strong> 1,6,7,8,9 间未定义组合碰撞消失</p>
            <p><strong>胜利:</strong> 横向排列 [91, 78, 69]</p>
        </div>
    </div>

  <script>
        const vanishSet = new Set([1, 6, 7, 8, 9]);
        let grid = [];
        let moves = 0;
        let gameOver = false;
        let gameWon = false;

        function initGrid() {
            grid = Array(4).fill(null).map(() => Array(4).fill(0));
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) {
                        emptyCells.push({ r: i, c: j });
                    }
                }
            }

            if (emptyCells.length > 0) {
                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const values = [6, 7, 8];
                grid[r][c] = values[Math.floor(Math.random() * values.length)];
            }
        }

        let lastRenderGrid = null;
        function renderGrid() {    
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';    
            let maxTile = 0;    
            for (let i = 0; i < 4; i++) {        
                for (let j = 0; j < 4; j++) {            
                    const cell = document.createElement('div');            
                    const value = grid[i][j];            
                    const prev = lastRenderGrid?.[i]?.[j] ?? 0;
                    cell.className = 'cell';            
                    if (value !== 0) {
                        cell.textContent = value;
                        cell.setAttribute('data-value', value.toString());                
                        if (value > maxTile) maxTile = value;                
                        if (lastRenderGrid && value !== prev) {
                            cell.classList.add('tile-pop');                    
                            setTimeout(() => cell.classList.remove('tile-pop'), 220);
                        }
                    }
                    gridEl.appendChild(cell);
                }
            }
            document.getElementById('moves').textContent = moves;
            document.getElementById('max-tile').textContent = maxTile;
            lastRenderGrid = grid.map(row => [...row]);
        }

        function getCombineResult(v1, v2, direction) {
            // v1 是撞击者，v2 是被撞击者
            if (v1 === 0 || v2 === 0) return null;

            // 竖向合成 (上下方向)
            if (direction === 'up' || direction === 'down') {
                if (v1 === 6 && v2 === 7) return 13;   // 6 下滑撞 7
                if (v1 === 7 && v2 === 6) return 1;    // 7 上滑撞 6
                if (v1 === 8 && v2 === 7) return 1;    // 8 撞 7
                if ((v1 === 13 && v2 === 78) || (v1 === 78 && v2 === 13)) return 91;
                if ((v1 === 91 && v2 === 1) || (v1 === 1 && v2 === 91)) return 9;
            }

            // 横向合成 (左右方向)
            if (direction === 'left' || direction === 'right') {
                if (v1 === 7 && v2 === 8) return 78;   // 7 左右触发 78
                if ((v1 === 13 && v2 === 78) || (v1 === 78 && v2 === 13)) return 91;
                if (v1 === 6 && v2 === 9) return 69;
                if ((v1 === 91 && v2 === 1) || (v1 === 1 && v2 === 91)) return 9;
            }

            // 未定义组合：1/6/7/8/9 间消失
            if (vanishSet.has(v1) && vanishSet.has(v2)) {
                return 'vanish';
            }

            return null;
        }

        function processLine(line, direction) {
            // 为统一逻辑：右/下方向先反转行列，让“向左/向上”统一处理
            const working = (direction === 'right' || direction === 'down')
                ? [...line].reverse()
                : [...line];

            let filtered = working.filter(x => x !== 0);
            if (filtered.length === 0) return [0, 0, 0, 0];

            const result = [];
            let i = 0;

            while (i < filtered.length) {
                if (i === filtered.length - 1) {
                    result.push(filtered[i]);
                    break;
                }

                // 在统一方向里：右侧/下方的当作撞击者
                const target = filtered[i];
                const collider = filtered[i + 1];
                const res = getCombineResult(collider, target, direction);

                if (res === 'vanish') {
                    i += 2;
                } else if (res !== null) {
                    result.push(res);
                    i += 2;
                } else {
                    result.push(target);
                    i++;
                }
            }

            while (result.length < 4) {
                result.push(0);
            }

            return (direction === 'right' || direction === 'down')
                ? result.reverse()
                : result;
        }

        function arraysEqual(a, b) {
            for (let i = 0; i < a.length; i++) {
                if (a[i] !== b[i]) return false;
            }
            return true;
        }

        function simulateMove(sourceGrid, direction) {
            const newGrid = sourceGrid.map(row => [...row]);
            let changed = false;

            if (direction === 'left' || direction === 'right') {
                for (let i = 0; i < 4; i++) {
                    const line = [...newGrid[i]];
                    const processed = processLine(line, direction);
                    if (!arraysEqual(line, processed)) changed = true;
                    newGrid[i] = processed;
                }
            } else {
                for (let j = 0; j < 4; j++) {
                    const line = [newGrid[0][j], newGrid[1][j], newGrid[2][j], newGrid[3][j]];
                    const processed = processLine(line, direction);
                    for (let i = 0; i < 4; i++) {
                        if (newGrid[i][j] !== processed[i]) changed = true;
                        newGrid[i][j] = processed[i];
                    }
                }
            }

            return { newGrid, changed };
        }

        function move(direction) {
            if (gameOver || gameWon) return;

            const { newGrid, changed } = simulateMove(grid, direction);
            if (!changed) return;

            grid = newGrid;
            moves++;
            addRandomTile();
            renderGrid();
            checkWin();
            checkGameOver();
        }

        function checkWin() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j <= 1; j++) {
                    if (grid[i][j] === 91 && grid[i][j + 1] === 78 && grid[i][j + 2] === 69) {
                        gameWon = true;
                        showMessage('🎉 恭喜获胜！目标达成：[91, 78, 69]', 'success');
                        return;
                    }
                }
            }
        }

        function canMoveDirection(direction) {
            const { changed } = simulateMove(grid, direction);
            return changed;
        }

        function checkGameOver() {
            // 有空格直接不是结束
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) return;
                }
            }

            // 只有能在任一方向产生变化才不算结束
            if (canMoveDirection('left') ||
                canMoveDirection('right') ||
                canMoveDirection('up') ||
                canMoveDirection('down')) {
                return;
            }

            gameOver = true;
            showMessage('💀 游戏结束！无法继续移动', 'info');
        }

        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = 'message ' + type;
        }

        function newGame() {
            initGrid();
            moves = 0;
            gameOver = false;
            gameWon = false;
            lastRenderGrid = null;
            document.getElementById('message').className = 'message';

            // 初始添加几个数字
            addRandomTile();
            addRandomTile();
            addRandomTile();

            renderGrid();
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight','KeyW', 'KeyA', 'KeyS', 'KeyD'].includes(e.key)) {
                e.preventDefault();
            }

            switch (e.key) {
                case 'ArrowUp':
                case 'KeyW':
                    move('up');
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    move('down');
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    move('left');
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    move('right');
                    break;
            }
        });

        // 启动游戏
        newGame();
    </script>

</body>
</html>
